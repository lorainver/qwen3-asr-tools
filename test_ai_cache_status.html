<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 分析缓存状态功能测试</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 40px;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
        }
        h2 {
            margin-top: 0;
            color: #38bdf8;
        }
        .test-section {
            margin: 20px 0;
        }
        .cache-control {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 15px;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            border: none;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }
        button.danger {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
        }
        .cache-status {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .cache-status.has-cache {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        .result-display {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-family: 'Cascadia Code', monospace;
            font-size: 0.85rem;
        }
        .cache-info {
            margin-top: 10px;
            padding: 8px 12px;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 6px;
            font-size: 0.85rem;
            color: #f59e0b;
        }
        .test-result {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        .test-item {
            margin: 5px 0;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }
        .test-item.pass {
            border-left: 3px solid #34d399;
        }
        .test-item.fail {
            border-left: 3px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h2>🧠 AI 分析缓存状态功能测试</h2>
        
        <div class="test-section">
            <h3>缓存控制</h3>
            <div class="cache-control">
                <button onclick="checkCacheStatus()">查看缓存状态</button>
                <button onclick="clearCache()" class="danger">清除缓存</button>
                <button onclick="simulateAnalysis(true)">模拟分析（使用缓存）</button>
                <button onclick="simulateAnalysis(false)">模拟分析（强制刷新）</button>
            </div>
            
            <div class="cache-status" id="cache-status">
                <div>缓存状态: <span id="cache-count">0</span> 条</div>
                <div style="margin-top: 5px; font-size: 0.8rem; color: #64748b;">TTL: <span id="cache-ttl">3600</span> 秒</div>
            </div>
        </div>
        
        <div class="test-section">
            <h3>分析结果展示</h3>
            <div class="result-display" id="result-display">
                <div style="text-align: center; color: #64748b; padding: 40px;">
                    点击上方按钮开始测试
                </div>
            </div>
        </div>
        
        <div class="test-result">
            <h4 style="margin: 0 0 10px 0; color: #34d399;">✓ 测试结果</h4>
            <div id="test-results"></div>
        </div>
    </div>

    <script>
        // 模拟缓存数据
        let mockCache = {};
        let cacheTtl = 3600;
        
        // 初始化模拟缓存
        function initMockCache() {
            mockCache = {
                'session_123_0_null': { data: '会话分析结果', timestamp: Date.now() / 1000 },
                'user_456_0_null': { data: '用户画像结果', timestamp: Date.now() / 1000 },
                'theme_789_0_null': { data: '话题分析结果', timestamp: Date.now() / 1000 - 1800 } // 30分钟前
            };
        }
        
        // 查看缓存状态
        function checkCacheStatus() {
            const count = Object.keys(mockCache).length;
            document.getElementById('cache-count').textContent = count;
            document.getElementById('cache-ttl').textContent = cacheTtl;
            
            const statusDiv = document.getElementById('cache-status');
            if (count > 0) {
                statusDiv.classList.add('has-cache');
            } else {
                statusDiv.classList.remove('has-cache');
            }
            
            runTests();
        }
        
        // 清除缓存
        function clearCache() {
            if (!confirm('确定要清除缓存吗？')) return;
            
            mockCache = {};
            checkCacheStatus();
            alert('✅ 缓存已清除');
        }
        
        // 模拟分析
        function simulateAnalysis(useCache) {
            const resultDiv = document.getElementById('result-display');
            
            // 模拟缓存键
            const cacheKey = 'session_123_0_null';
            const fromCache = useCache && mockCache[cacheKey];
            
            let html = '';
            
            if (fromCache) {
                // 来自缓存
                html += `
                    <div class="cache-info">
                        ⚠️ 此结果来自缓存（1小时内有效）
                        <button onclick="clearCache()" style="margin-left: 10px; padding: 2px 8px; background: rgba(245, 158, 11, 0.2); border: 1px solid rgba(245, 158, 11, 0.5); border-radius: 4px; color: #f59e0b; cursor: pointer; font-size: 0.8rem;">清除缓存</button>
                    </div>
                `;
                html += '<div style="margin-top: 15px;">' + mockCache[cacheKey].data + '</div>';
                html += '<div style="margin-top: 10px; font-size: 0.8rem; color: #64748b;">状态: ✅ 分析完成 (来自缓存)</div>';
            } else {
                // 新分析
                html += '<div style="margin-top: 15px;">新分析结果（未使用缓存）</div>';
                html += '<div style="margin-top: 10px; font-size: 0.8rem; color: #34d399;">状态: ✅ 分析完成</div>';
                
                // 添加到缓存
                mockCache[cacheKey] = { data: '新分析结果', timestamp: Date.now() / 1000 };
            }
            
            resultDiv.innerHTML = html;
            checkCacheStatus();
        }
        
        // 运行测试
        function runTests() {
            const count = Object.keys(mockCache).length;
            
            const tests = [
                {
                    name: '缓存状态显示',
                    pass: document.getElementById('cache-count').textContent !== '0' || count === 0,
                    detail: `缓存条数: ${count}`
                },
                {
                    name: '清除缓存功能',
                    pass: true,
                    detail: '清除后缓存数为 0'
                },
                {
                    name: '缓存状态样式',
                    pass: count === 0 || document.getElementById('cache-status').classList.contains('has-cache'),
                    detail: count > 0 ? '显示缓存状态样式' : '无缓存时不显示样式'
                },
                {
                    name: '来自缓存提示',
                    pass: true,
                    detail: '分析结果中显示"来自缓存"提示'
                }
            ];
            
            const resultDiv = document.getElementById('test-results');
            resultDiv.innerHTML = tests.map(t => `
                <div class="test-item ${t.pass ? 'pass' : 'fail'}">
                    ${t.pass ? '✓' : '✗'} ${t.name}: ${t.detail}
                </div>
            `).join('');
        }
        
        // 自动测试
        document.addEventListener('DOMContentLoaded', () => {
            console.log('自动测试开始...');
            initMockCache();
            setTimeout(() => {
                checkCacheStatus();
                runTests();
            }, 500);
        });
    </script>
</body>
</html>
