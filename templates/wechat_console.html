                const msgs = result.messages || [];
                wechatState.totalCount = result.filtered_message_count;

                // 检查请求是否过期
                if (currentVersion !== wechatState.requestVersion) {
                    console.log('请求已过期，跳过渲染');
                    wechatState.isLoading = false;
                    return;
                }

                if (prepend) {
                    const scrollEl = virtualScrollState.isEnabled ? document.querySelector('.wechat-virtual-container') : feed;
                    const oldScrollHeight = scrollEl ? scrollEl.scrollHeight : 0;
                    const oldScrollTop = scrollEl ? scrollEl.scrollTop : 0;

                    wechatState.messages = msgs.concat(wechatState.messages);
                    renderWechatBubbles(wechatState.messages, '');

                    const newScrollEl = virtualScrollState.isEnabled ? document.querySelector('.wechat-virtual-container') : feed;
                    if (newScrollEl) {
                        newScrollEl.scrollTop = oldScrollTop + (newScrollEl.scrollHeight - oldScrollHeight);
                    }
                } else if (append) {
                    wechatState.messages = wechatState.messages.concat(msgs);
                    renderWechatBubbles(wechatState.messages, '');
                } else {
                    wechatState.messages = msgs;
                    renderWechatBubbles(wechatState.messages, '');
                    const scrollEl = virtualScrollState.isEnabled ? document.querySelector('.wechat-virtual-container') : feed;
                    if (scrollEl) {
                        scrollEl.scrollTop = scrollEl.scrollHeight;
                    }
                }

                wechatState.offset = offset;

                const startNum = Math.min(wechatState.totalCount, wechatState.offset + 1);
                const endNum = Math.min(wechatState.totalCount, wechatState.offset + msgs.length);
                stats.textContent = `当前展示第 ${startNum} - ${endNum} 条 (共 ${wechatState.totalCount} 条)`;

            } catch(e) {
                console.error(e);
                stats.textContent = '❌ 加载出错';
            } finally {
                wechatState.isLoading = false;
            }
        }

        // 加载指定会话的消息
        async function loadWechatSessionMessages(sessionId) {
            if (!sessionId) return;
            const feed = document.getElementById('wechat-bubble-feed');
            feed.innerHTML = '<div style="text-align: center; color: var(--text-muted, #64748b); margin-top: 60px;">正在加载聊天记录...</div>';

            // 清理检索备份并隐藏返回按钮
            const backBtn = document.getElementById('wechat-back-to-search-btn');
            if (backBtn) backBtn.style.display = 'none';
            wechatState.searchBackup = null;

            // 重置状态，防止消息混入
            wechatState.sessionId = sessionId;
            wechatState.isSearchMode = false;
            wechatState.messages = [];  // 清空消息数组
            wechatState.offset = 0;
            wechatState.totalCount = 0;
            
            // 重置虚拟滚动状态
            virtualScrollState = {
                isEnabled: false,
                totalCount: 0,
                renderedCount: 0,
                scrollTop: 0,
                visibleStart: 0,
                visibleEnd: 0,
                messages: [],
                renderedMessages: [],
                lastScrollTime: 0
            };

            const st = getSelectedStartTime();
            const et = getSelectedEndTime();
            let url = `/api/wechat/session/${sessionId}?limit=1&offset=0`;
            if (st) url += `&start_time=${st}`;
            if (et) url += `&end_time=${et}`;

            try {
                const res = await fetch(url);
                const result = await res.json();
                if (result.success) {
                    const total = result.filtered_message_count;
                    const startOffset = Math.max(0, total - wechatState.limit);
                    await fetchSessionMessages(sessionId, startOffset, wechatState.limit, false, false);
                }
            } catch(err) {
                console.error('加载初始消息失败:', err);
                const stats = document.getElementById('wechat-feed-stats');
                stats.textContent = '❌ 加载失败';
            }
        }

        // 切换搜索范围: 全量 vs 指定会话
        function toggleSearchScope(scope) {
            wechatState.searchScope = scope;
            const typeFilter = document.getElementById('search-type-filter');
            if (scope === 'all') {
                if (typeFilter) typeFilter.style.display = 'flex';
            } else {
                if (typeFilter) typeFilter.style.display = 'none';
            }
        }

        // 切换会话类型过滤
        function toggleSearchSessionType(type) {
            wechatState.searchSessionType = type;
        }


        // 渲染搜索结果分类统计列表
        function renderSearchCategoryList(typeStats, totalCount) {
            const container = document.getElementById('search-category-container');
            const list = document.getElementById('search-category-list');
            
            if (!typeStats || typeStats.length === 0) {
                container.style.display = 'none';
                return;
            }
            
            container.style.display = 'block';
            
            const typeLabelMap = { '群聊': '👥', '私聊': '👤', '公众号': '📢', '未知': '❓' };
            const typeColorMap = { '群聊': '#8b5cf6', '私聊': '#38bdf8', '公众号': '#f59e0b', '未知': '#94a3b8' };
            
            let html = '';
            
            // 添加"全部"选项
            const allActive = wechatState.activeCategory === '' ? 'active' : '';
            html += '<div class="search-category-item ' + allActive + '" onclick="filterByCategory(\'\')">' +
                '<div class="category-info">' +
                '<span class="category-icon">📋</span>' +
                '<span class="category-name">全部结果</span>' +
                '</div>' +
                '<span class="category-count" style="background:rgba(56,189,248,0.2);color:#38bdf8;">' + totalCount + '</span>' +
                '</div>';
            
            // 添加各分类选项
            for (const stat of typeStats) {
                const type = stat.type;
                const icon = typeLabelMap[type] || '💬';
                const color = typeColorMap[type] || '#94a3b8';
                const active = wechatState.activeCategory === type ? 'active' : '';
                
                html += '<div class="search-category-item ' + active + '" onclick="filterByCategory(\'' + type + '\')">' +
                    '<div class="category-info">' +
                    '<span class="category-icon">' + icon + '</span>' +
                    '<span class="category-name">' + type + '</span>' +
                    '</div>' +
                    '<span class="category-count" style="background:' + color + '20;color:' + color + ';">' + stat.count + '</span>' +
                    '</div>';
            }
            
            list.innerHTML = html;
        }
        
        // 按分类筛选搜索结果
        function filterByCategory(category) {
            wechatState.activeCategory = category;
            
            // 更新分类列表的激活状态
            const items = document.querySelectorAll('.search-category-item');
            items.forEach(item => {
                item.classList.remove('active');
            });
            
            // 找到对应的项并添加激活状态
            const targetItem = Array.from(items).find(item => {
                const nameEl = item.querySelector('.category-name');
                if (category === '') {
                    return nameEl && nameEl.textContent === '全部结果';
                }
                return nameEl && nameEl.textContent === category;
            });
            if (targetItem) {
                targetItem.classList.add('active');
            }
            
            // 筛选并渲染消息
            if (category === '') {
                // 显示全部
                renderWechatBubblesGrouped(wechatState.allSearchResults, wechatState.keyword);
            } else {
                // 按分类筛选
                const filtered = wechatState.allSearchResults.filter(msg => (msg.session_type || '未知') === category);
                renderWechatBubblesGrouped(filtered, wechatState.keyword);
            }
            
            // 更新统计信息
            const stats = document.getElementById('wechat-feed-stats');
            const displayCount = category === '' ? wechatState.allSearchResults.length : 
                wechatState.allSearchResults.filter(msg => (msg.session_type || '未知') === category).length;
            stats.textContent = '显示 ' + (category || '全部') + ' ' + displayCount + ' 条结果';
        }

        // 切换会话组展开/折叠状态（支持懒加载）
        function toggleGroupCollapse(sessionId) {
            const groupContent = document.getElementById(`wechat-group-content-${sessionId}`);
            const arrow = document.getElementById(`wechat-group-arrow-${sessionId}`);
            const sid = sessionId.toString();
            
            if (wechatState.collapsedGroups.has(sid)) {
                // 展开
                wechatState.collapsedGroups.delete(sid);
                if (groupContent) groupContent.style.display = 'block';
                if (arrow) arrow.textContent = '▼';
                
                // 如果该分组还没有加载过消息，触发懒加载
                if (!wechatState.groupMessagesCache[sessionId] && wechatState.groupLoadingStatus[sessionId] !== 'loading') {
                    loadGroupMessages(sessionId, wechatState.keyword, groupContent);
                }
            } else {
                // 折叠
                wechatState.collapsedGroups.add(sid);
                if (groupContent) groupContent.style.display = 'none';
                if (arrow) arrow.textContent = '►';
            }
        }

        // 恢复检索结果状态
        function restoreWechatSearch() {
            if (!wechatState.searchBackup) return;
            
            const backup = wechatState.searchBackup;
            wechatState.searchBackup = null;
            
            // 恢复输入框
            document.getElementById('wechat-keyword-input').value = backup.keyword;
            document.getElementById('wechat-sender-input').value = backup.sender;
            
            // 恢复搜索状态
            wechatState.searchResults = backup.searchResults;
            wechatState.allSearchResults = backup.allSearchResults;
            wechatState.searchTotal = backup.searchTotal;
            wechatState.searchOffset = backup.searchOffset;
            wechatState.searchSessionType = backup.searchSessionType;
            wechatState.activeCategory = backup.activeCategory;
            wechatState.searchScope = backup.searchScope;
            wechatState.searchTypeStats = backup.searchTypeStats;
            wechatState.isSearchMode = true;
            
            // 恢复分组状态
            wechatState.groupSessionStats = backup.groupSessionStats || [];
            wechatState.groupMessagesCache = backup.groupMessagesCache || {};
            wechatState.collapsedGroups = backup.collapsedGroups || new Set();
            
            // 清理单会话选择UI
            document.getElementById('wechat-session-select').value = '';
            
            // 隐藏返回按钮
            document.getElementById('wechat-back-to-search-btn').style.display = 'none';
            
            // 更新分类筛选UI
            if (wechatState.searchScope === 'all' && !wechatState.searchSessionType) {
                renderSearchCategoryList(wechatState.searchTypeStats, wechatState.searchTotal);
            } else {
                document.getElementById('search-category-container').style.display = 'none';
            }
            
            // 重新渲染分组（使用缓存的消息）
            renderWechatBubblesGrouped([], backup.keyword);
            
            // 恢复滚动位置
            const feed = document.getElementById('wechat-bubble-feed');
            setTimeout(() => {
                feed.scrollTop = backup.scrollPosition;
            }, 100);
            
            // 更新统计文本
            const typeStats = wechatState.searchTypeStats;
            let statsText = `共搜索到 ${wechatState.searchTotal} 条`;
            if (typeStats.length > 0 && wechatState.searchScope === 'all' && !wechatState.searchSessionType) {
                const parts = typeStats.map(t => `${t.type}${t.count}条`).join(' / ');
                statsText += ` (${parts})`;
            }
            document.getElementById('wechat-feed-stats').textContent = statsText;
        }

        // 按会话来源分组渲染搜索结果（支持按群懒加载）
        function renderWechatBubblesGrouped(messages, keyword) {
            const feed = document.getElementById('wechat-bubble-feed');
            feed.innerHTML = '';

            // 使用 groupSessionStats 渲染分组卡片
            const sessionStats = wechatState.groupSessionStats;
            if (!sessionStats || sessionStats.length === 0) {
                feed.innerHTML = '<div style="text-align:center;color:var(--text-muted,#64748b);margin-top:60px;">未找到匹配结果</div>';
                return;
            }

            const typeLabelMap = { '群聊': '👥', '私聊': '👤', '公众号': '📢', '未知': '❓' };
            const typeColorMap = { '群聊': '#8b5cf6', '私聊': '#38bdf8', '公众号': '#f59e0b', '未知': '#94a3b8' };

            // 按匹配数量排序
            const sortedStats = [...sessionStats].sort((a, b) => b.count - a.count);

            let isFirstExpanded = false;

            for (const stat of sortedStats) {
                const sid = stat.id;
                const icon = typeLabelMap[stat.type] || '💬';
                const color = typeColorMap[stat.type] || '#94a3b8';
                
                // 第一个分组默认展开，其他默认折叠
                const isCollapsed = wechatState.collapsedGroups.has(sid.toString());
                
                // 第一个分组自动展开
                if (!isFirstExpanded && !wechatState.collapsedGroups.has(sid.toString())) {
                    isFirstExpanded = true;
                    // 如果缓存中没有该分组的消息，标记需要加载
                    if (!wechatState.groupMessagesCache[sid]) {
                        wechatState.groupLoadingStatus[sid] = 'pending';
                    }
                }

                const groupContainer = document.createElement('div');
                groupContainer.className = 'wechat-group-container';
                groupContainer.style.cssText = 'margin-bottom: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); background: rgba(30, 41, 59, 0.15); box-shadow: 0 2px 8px rgba(0,0,0,0.1);';

                // 组头部
                const header = document.createElement('div');
                header.className = 'wechat-group-header';
                header.style.cssText = `display:flex;align-items:center;gap:8px;padding:10px 16px;background:${color}12;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.88rem;font-weight:600;color:${color};cursor:pointer;user-select:none;transition: all 0.2s ease;`;
                
                header.onmouseover = function() { header.style.background = `${color}22`; };
                header.onmouseout = function() { header.style.background = `${color}12`; };

                const arrowChar = isCollapsed ? '►' : '▼';
                const loadStatus = wechatState.groupLoadingStatus[sid];
                const statusText = loadStatus === 'loading' ? ' <span style="font-size:0.7rem;color:#f59e0b;">⏳ 加载中...</span>' : '';
                
                header.innerHTML = `
                    <span id="wechat-group-arrow-${sid}" style="margin-right: 6px; font-family: monospace; font-size: 0.8rem; color: var(--text-muted, #64748b); transition: transform 0.2s;">${arrowChar}</span>
                    <span style="font-size:1.05rem;">${icon}</span>
                    <span style="color:var(--text-primary, #f1f5f9); font-weight:700;">${escapeHtml(stat.name)}</span>
                    <span style="margin-left:6px; font-size:0.72rem; color:var(--text-muted, #94a3b8); font-weight:normal;">(${stat.type})</span>
                    ${statusText}
                    <span style="margin-left:auto;font-size:0.78rem;background:${color}18;color:${color};border:1px solid ${color}28;padding:2px 10px;border-radius:12px;font-weight:600;">${stat.count} 条</span>
                `;
                
                header.onclick = function() {
                    toggleGroupCollapse(sid);
                };
                
                groupContainer.appendChild(header);

                // 组内容容器
                const contentDiv = document.createElement('div');
                contentDiv.id = `wechat-group-content-${sid}`;
                contentDiv.style.display = isCollapsed ? 'none' : 'block';
                contentDiv.style.minHeight = '20px';

                groupContainer.appendChild(contentDiv);
                feed.appendChild(groupContainer);

                // 如果该分组已展开且有缓存，直接渲染
                if (!isCollapsed && wechatState.groupMessagesCache[sid]) {
                    const cached = wechatState.groupMessagesCache[sid];
                    _renderWechatBubblesToContainer(cached.messages, keyword, contentDiv);
                    
                    // 如果还有更多，显示该分组的"加载更多"按钮
                    if (cached.offset < cached.total) {
                        appendGroupLoadMoreBtn(sid, contentDiv, keyword);
                    }
                } else if (!isCollapsed && wechatState.groupLoadingStatus[sid] === 'pending') {
                    // 异步加载该分组的消息
                    loadGroupMessages(sid, keyword, contentDiv);
                }
            }
        }

        // 加载指定分组的消息（按群懒加载）
        async function loadGroupMessages(sessionId, keyword, container) {
            if (wechatState.groupLoadingStatus[sessionId] === 'loading') return;
            
            wechatState.groupLoadingStatus[sessionId] = 'loading';
            
            // 更新头部状态显示
            const arrow = document.getElementById(`wechat-group-arrow-${sessionId}`);
            if (arrow) arrow.textContent = '▼';
            
            const st = getSelectedStartTime();
            const et = getSelectedEndTime();
            const sender = wechatState.sender || '';
            
            const params = new URLSearchParams();
            params.set('keyword', keyword || '');
            params.set('only_sender', sender ? 'true' : 'false');
            if (sender) params.set('sender_display_name', sender);
            params.set('session_id', sessionId);
            params.set('limit', '50');
            params.set('offset', '0');
            if (st) params.set('start_time', st);
            if (et) params.set('end_time', et);
            
            try {
                const res = await fetch(`/api/wechat/search/keyword?${params.toString()}`);
                const result = await res.json();
                
                if (!result.success) {
                    wechatState.groupLoadingStatus[sessionId] = 'error';
                    container.innerHTML = '<div style="padding:16px;color:#ef4444;">加载失败，请重试</div>';
                    return;
                }
                
                const data = result.data;
                wechatState.groupMessagesCache[sessionId] = {
                    messages: data.results || [],
                    offset: (data.results || []).length,
                    total: data.total || 0
                };
                wechatState.groupLoadingStatus[sessionId] = 'loaded';
                
                // 渲染消息
                container.innerHTML = '';
                _renderWechatBubblesToContainer(data.results, keyword, container);
                
                // 如果还有更多，显示该分组的"加载更多"按钮
                if (data.results.length < data.total) {
                    appendGroupLoadMoreBtn(sessionId, container, keyword);
                }
                
            } catch (err) {
                console.error('加载分组消息失败:', err);
                wechatState.groupLoadingStatus[sessionId] = 'error';
                container.innerHTML = '<div style="padding:16px;color:#ef4444;">加载失败，请重试</div>';
            }
        }

        // 为分组添加"加载更多"按钮
        function appendGroupLoadMoreBtn(sessionId, container, keyword) {
            const cached = wechatState.groupMessagesCache[sessionId];
            if (!cached) return;
            
            const remaining = cached.total - cached.offset;
            if (remaining <= 0) return;
            
            // 移除已有的加载更多按钮
            const existingBtn = container.querySelector('.group-load-more-btn');
            if (existingBtn) existingBtn.remove();
            
            const btnContainer = document.createElement('div');
            btnContainer.className = 'group-load-more-btn';
            btnContainer.style.cssText = 'text-align:center;padding:12px 16px;border-top:1px solid rgba(255,255,255,0.04);';
            btnContainer.innerHTML = `
                <button class="kb-btn kb-btn-secondary" onclick="loadMoreGroupMessages(${sessionId}, '${escapeHtml(keyword)}')" style="min-width:140px;font-size:0.82rem;">
                    📥 加载更多 (剩余 ${remaining} 条)
                </button>
            `;
            container.appendChild(btnContainer);
        }

        // 加载更多指定分组的消息
        async function loadMoreGroupMessages(sessionId, keyword) {
            const cached = wechatState.groupMessagesCache[sessionId];
            if (!cached || wechatState.groupLoadingStatus[sessionId] === 'loading') return;
            
            wechatState.groupLoadingStatus[sessionId] = 'loading';
            
            const container = document.getElementById(`wechat-group-content-${sessionId}`);
            if (!container) return;
            
            const st = getSelectedStartTime();
            const et = getSelectedEndTime();
            const sender = wechatState.sender || '';
            
            const params = new URLSearchParams();
            params.set('keyword', keyword || '');
            params.set('only_sender', sender ? 'true' : 'false');
            if (sender) params.set('sender_display_name', sender);
            params.set('session_id', sessionId);
            params.set('limit', '50');
            params.set('offset', cached.offset.toString());
            if (st) params.set('start_time', st);
            if (et) params.set('end_time', et);
            
            try {
                const res = await fetch(`/api/wechat/search/keyword?${params.toString()}`);
                const result = await res.json();
                
                if (!result.success) {
                    wechatState.groupLoadingStatus[sessionId] = 'loaded';
                    return;
                }
                
                const newMessages = result.data.results || [];
                cached.messages = cached.messages.concat(newMessages);
                cached.offset = cached.messages.length;
                wechatState.groupLoadingStatus[sessionId] = 'loaded';
                
                // 移除旧的加载更多按钮
                const oldBtn = container.querySelector('.group-load-more-btn');
                if (oldBtn) oldBtn.remove();
                
                // 渲染新消息
                _renderWechatBubblesToContainer(newMessages, keyword, container);
                
                // 如果还有更多，重新添加加载更多按钮
                if (cached.offset < cached.total) {
                    appendGroupLoadMoreBtn(sessionId, container, keyword);
                }
                
            } catch (err) {
                console.error('加载更多消息失败:', err);
                wechatState.groupLoadingStatus[sessionId] = 'loaded';
            }
        }

        // 创建高可读性搜索命中结果卡片
        function createSearchHitElement(msg, keyword) {
            const div = document.createElement('div');
            div.className = 'search-hit-card';
            
            const senderName = msg.sender_display_name || msg.sender_username || '未知用户';
            const jumpBtnHtml = `<span class="wechat-jump-btn" onclick="jumpToMessageContext(${msg.id}, ${msg.session_id})">🔍 定位上下文</span>`;
            
            const renderedContent = renderMessageContent(msg.content || '', keyword, div, msg.id);
            
            div.innerHTML = `
                <div class="search-hit-header">
                    <div>
                        <span class="search-hit-sender">${escapeHtml(senderName)}</span>
                        <span class="search-hit-time">${msg.formatted_time || ''}</span>
                    </div>
                    ${jumpBtnHtml}
                </div>
                <div class="search-hit-body">${renderedContent}</div>
            `;
            
            return div;
        }

        // 渲染消息到指定的分组容器中 (使用高可读性卡片格式)
        function _renderWechatBubblesToContainer(messages, keyword, container) {
            if (!messages || messages.length === 0) return;

            const fragment = document.createDocumentFragment();

            for (const msg of messages) {
                // 使用全新的高可读性卡片代替传统的聊天气泡
                const msgElement = createSearchHitElement(msg, keyword);
                fragment.appendChild(msgElement);
            }

            container.appendChild(fragment);
        }

        // 点击头像或用户名筛选发言人
        function filterBySender(senderName) {
            const senderInput = document.getElementById('wechat-sender-input');
            if (senderInput) {
                senderInput.value = senderName;
            }
            
            // 如果当前在某个特定会话中，点击发言人默认筛选该会话
            if (wechatState.sessionId) {
                wechatState.searchScope = 'session';
                const sessionRadio = document.getElementById('search-scope-session');
                if (sessionRadio) {
                    sessionRadio.checked = true;
                    toggleSearchScope('session');
                }
            }
            
            // 清空关键字，只过滤该用户发言
            const keywordInput = document.getElementById('wechat-keyword-input');
            if (keywordInput) {
                keywordInput.value = '';
            }
            
            searchWechatMessages(false);
        }

        // 检索消息 (FTS + Senders)
        async function searchWechatMessages(loadMore = false) {
            const keyword = document.getElementById('wechat-keyword-input').value.trim();
            const sender = document.getElementById('wechat-sender-input').value.trim();
            const scope = wechatState.searchScope;
            // 指定会话搜索时从微信会话选择器取值；全量搜索时忽略
            const sessionId = (scope === 'session')
                ? (document.getElementById('wechat-session-select') || {value:''}).value
                : '';
            const sessionType = wechatState.searchSessionType;
            const stats = document.getElementById('wechat-feed-stats');
            const feed = document.getElementById('wechat-bubble-feed');

            if (scope === 'session' && !sessionId) {
                alert('请先在上方“选择微信会话 (Session)”中选择要检索的会话');
                return;
            }

            if (!keyword && !sender) {
                alert('检索必须输入检索词或指定发言人昵称');
                return;
            }

            if (!loadMore) {
                wechatState.isSearchMode = true;
                wechatState.keyword = keyword;
                wechatState.sender = sender;
                wechatState.searchOffset = 0;
                wechatState.searchResults = [];
                wechatState.searchTypeStats = [];
                wechatState.groupSessionStats = [];   // 修复:重置会话分组统计
                wechatState.groupMessagesCache = {};  // 修复:重置分组消息缓存
                wechatState.groupLoadingStatus = {};  // 修复:重置分组加载状态
                wechatState.searchBackup = null; // 清空旧的备份状态
                
                const backBtn = document.getElementById('wechat-back-to-search-btn');
                if (backBtn) backBtn.style.display = 'none';

                const scopeLabel = scope === 'all' ? (sessionType || '全部') : '指定会话';
                stats.textContent = `🔍 正在检索 [${scopeLabel}]...`;
                feed.innerHTML = '<div style="text-align: center; color: var(--text-muted, #64748b); margin-top: 60px;">正在执行全文检索中...</div>';
            } else {
                if (wechatState.isLoading) return;
                stats.textContent = '🔍 正在加载更多...';
            }

            wechatState.isLoading = true;
            const st = getSelectedStartTime();
            const et = getSelectedEndTime();

            try {
                let url = `/api/wechat/search/keyword?keyword=${encodeURIComponent(keyword)}&only_sender=${sender ? 'true' : 'false'}&limit=${wechatState.searchLimit}&offset=${wechatState.searchOffset}`;
                if (scope === 'session' && sessionId) {
                    url += `&session_id=${sessionId}`;
                }
                if (scope === 'all' && sessionType) {
                    url += `&session_type=${encodeURIComponent(sessionType)}`;
                }
                if (sender) {
                    url += `&sender_display_name=${encodeURIComponent(sender)}`;
                }
                if (st) url += `&start_time=${st}`;
                if (et) url += `&end_time=${et}`;

                const res = await fetch(url);
                const result = await res.json();
                if (!result.success) {
                    stats.textContent = '❌ 检索失败';
                    feed.innerHTML = '<div style="text-align: center; color: #ef4444; margin-top: 60px;">检索失败</div>';
                    wechatState.isLoading = false;
                    return;
                }

                const items = result.data.results || [];
                wechatState.searchTotal = result.data.total;
                // 保存类型统计
                wechatState.searchTypeStats = result.data.type_stats || [];
                // 修复:保存会话分组统计(后端已在 /api/wechat/search/keyword 返回 session_stats)
                wechatState.groupSessionStats = result.data.session_stats || [];

                if (!loadMore) {
                    wechatState.collapsedGroups = new Set();
                    if (wechatState.groupSessionStats.length > 1) {
                        for (let i = 1; i < wechatState.groupSessionStats.length; i++) {
                            wechatState.collapsedGroups.add(wechatState.groupSessionStats[i].id.toString());
                        }
                    }
                }

                if (loadMore) {
                    // 追加结果
                    wechatState.searchResults = wechatState.searchResults.concat(items);
                } else {
                    // 新搜索
                    wechatState.searchResults = items;
                }

                // 计算分页状态
                const loadedCount = wechatState.searchResults.length;
                const hasMore = loadedCount < wechatState.searchTotal;

                // 类型统计信息
                const typeStats = wechatState.searchTypeStats;
                let statsText = `共搜索到 ${wechatState.searchTotal} 条`;
                if (typeStats.length > 0 && wechatState.searchScope === 'all' && !wechatState.searchSessionType) {
                    const parts = typeStats.map(t => `${t.type}${t.count}条`).join(' / ');
                    statsText += ` (${parts})`;
                } else if (wechatState.searchScope === 'all' && wechatState.searchSessionType) {
                    statsText += ` [${wechatState.searchSessionType}]`;
                }
                stats.textContent = statsText + `，已加载 ${loadedCount} 条`;

                // 保存所有搜索结果用于分类筛选
                if (!loadMore) {
                    wechatState.allSearchResults = wechatState.searchResults;
                    wechatState.activeCategory = '';
                }
                
                // 渲染分类统计列表（仅在全量搜索时显示）
                if (wechatState.searchScope === 'all' && !wechatState.searchSessionType) {
                    renderSearchCategoryList(wechatState.searchTypeStats, wechatState.searchTotal);
                } else {
                    document.getElementById('search-category-container').style.display = 'none';
                }
                
                // 按类型分组渲染
                renderWechatBubblesGrouped(wechatState.searchResults, keyword, wechatState.searchScope === 'all' && !wechatState.searchSessionType);

                // 添加"加载更多"按钮(如果还有更多结果)
                if (hasMore) {
                    const loadMoreBtn = document.createElement('div');
                    loadMoreBtn.id = 'wechat-load-more-btn';
                    loadMoreBtn.style.cssText = 'text-align: center; padding: 20px; margin-top: 10px;';
                    loadMoreBtn.innerHTML = `
                        <button class="kb-btn kb-btn-secondary" onclick="searchWechatMessages(true)" style="min-width: 150px;">
                            📥 加载更多 (${wechatState.searchTotal - loadedCount} 条剩余)
                        </button>
                        <div style="margin-top: 8px; font-size: 0.85rem; color: var(--text-muted, #64748b);">
                            当前: 第 ${Math.ceil(loadedCount / wechatState.searchLimit)} 页 / 共 ${Math.ceil(wechatState.searchTotal / wechatState.searchLimit)} 页
                        </div>
                    `;
                    feed.appendChild(loadMoreBtn);
                }

                // 更新偏移量
                wechatState.searchOffset = wechatState.searchResults.length;

                // 滚动到底部(新搜索时)
                if (!loadMore) {
                    feed.scrollTop = feed.scrollHeight;
                }
            } catch(err) {
                console.error('全文检索失败:', err);
                stats.textContent = '❌ 检索异常';
                feed.innerHTML = '<div style="text-align: center; color: #ef4444; margin-top: 60px;">网络异常,请重试</div>';
            } finally {
                wechatState.isLoading = false;
            }
        }

        // 跳转上下文方法
        async function jumpToMessageContext(messageId, sessionId) {
            // 如果当前在检索模式，则备份检索状态以便返回
            if (wechatState.isSearchMode) {
                wechatState.searchBackup = {
                    searchResults: [...wechatState.searchResults],
                    allSearchResults: [...wechatState.allSearchResults],
                    searchTotal: wechatState.searchTotal,
                    searchOffset: wechatState.searchOffset,
                    keyword: document.getElementById('wechat-keyword-input').value,
                    sender: document.getElementById('wechat-sender-input').value,
                    scrollPosition: document.getElementById('wechat-bubble-feed').scrollTop,
                    searchSessionType: wechatState.searchSessionType,
                    activeCategory: wechatState.activeCategory,
                    searchScope: wechatState.searchScope,
                    searchTypeStats: [...wechatState.searchTypeStats],
                    groupSessionStats: [...wechatState.groupSessionStats],
                    groupMessagesCache: {...wechatState.groupMessagesCache},
                    collapsedGroups: new Set(wechatState.collapsedGroups)
                };
                
                // 显示返回按钮
                const backBtn = document.getElementById('wechat-back-to-search-btn');
                if (backBtn) backBtn.style.display = 'inline-block';
            }

            const sessionSelect = document.getElementById('wechat-session-select');
            sessionSelect.value = sessionId;

            document.getElementById('wechat-keyword-input').value = '';
            document.getElementById('wechat-sender-input').value = '';

            wechatState.sessionId = sessionId;
            wechatState.isSearchMode = false;

            const stats = document.getElementById('wechat-feed-stats');
            stats.textContent = '⏳ 正在定位上下文...';

            const st = getSelectedStartTime();
            const et = getSelectedEndTime();

            let posUrl = `/api/wechat/message/${messageId}/position`;
            let queryParams = [];
            if (st) queryParams.push(`start_time=${st}`);
            if (et) queryParams.push(`end_time=${et}`);
            if (queryParams.length) posUrl += `?${queryParams.join('&')}`;

            try {
                const posRes = await fetch(posUrl);
                const posResult = await posRes.json();
                if (!posResult.success) {
                    alert('定位失败,未找到该消息的位置');
                    return;
                }

                const pos = posResult.data.position;
                const half = Math.floor(wechatState.limit / 2);
                const targetOffset = Math.max(0, pos - half);

                await fetchSessionMessages(sessionId, targetOffset, wechatState.limit, false, false);

                setTimeout(() => {
                    const targetEl = document.querySelector(`[data-msg-id="${messageId}"]`);
                    if (targetEl) {
                        targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        targetEl.style.transition = 'background 1s ease';
                        targetEl.style.background = 'rgba(56, 189, 248, 0.15)';
                        setTimeout(() => {
                            targetEl.style.background = '';
                        }, 2500);
                    }
                }, 300);

            } catch(e) {
                console.error(e);
                alert('定位失败,网络异常');
            }
        }

        function toggleMaximizeAIResult() {
            const card = document.querySelector('.wechat-ai-card');
            const btn = document.getElementById('wechat-ai-maximize-btn');
            if (card.classList.contains('maximized')) {
                card.classList.remove('maximized');
                btn.innerHTML = '🗖 最大化';
            } else {
                card.classList.add('maximized');
                btn.innerHTML = '🗗 还原';
            }
        }

        // 运行 AI 研判
        let _wechatAiRunning = false;
        async function runWechatAIAnalysis() {
            if (_wechatAiRunning) return;

            const mode = document.getElementById('wechat-ai-mode').value;
            const useCache = document.getElementById('wechat-ai-cache').checked;
            const sessionId = document.getElementById('wechat-session-select').value;
            const status = document.getElementById('wechat-action-status');
            const resultDiv = document.getElementById('wechat-ai-result');

            if (mode === 'session' && !sessionId) {
                alert('会话脉络分析模式下必须先在上方选择一个微信会话');
                return;
            }

            let endpoint = '';
            let bodyPayload = { use_cache: useCache };
            
            const st = getSelectedStartTime();
            const et = getSelectedEndTime();
            if (st) bodyPayload.start_time = st;
            if (et) bodyPayload.end_time = et;

            if (mode === 'session') {
                endpoint = '/api/wechat/analyze/session';
                bodyPayload.session_id = parseInt(sessionId);
            } else if (mode === 'top5') {
                if (!sessionId) {
                    alert('群内活跃前五研判模式下必须先在上方选择一个微信会话');
                    return;
                }
                endpoint = '/api/wechat/analyze/top5';
                bodyPayload.session_id = parseInt(sessionId);
            } else if (mode === 'user') {
                const sender = document.getElementById('wechat-sender-input').value.trim();
                if (!sender) {
                    alert('个人画像研判模式下必须在左侧输入"发言人筛选"的昵称');
                    return;
                }
                endpoint = '/api/wechat/analyze/user';
                bodyPayload.username = sender;
            } else if (mode === 'theme') {
                // 针对群聊话题演进分析,使用当前选择 the session display_name 或者直接输入
                const sessionSelect = document.getElementById('wechat-session-select');
                let groupName = '';
                if (sessionId) {
                    const text = sessionSelect.options[sessionSelect.selectedIndex].text;
                    groupName = text.replace(/^\[.*?\]\s*/, '').replace(/\s*\(.*?\)$/, '');
                } else {
                    groupName = document.getElementById('wechat-sender-input').value.trim();
                }
                if (!groupName) {
                    alert('话题演进分析模式下必须选择会话或在"发言人筛选"框输入群名称');
                    return;
                }
                endpoint = '/api/wechat/analyze/theme';
                bodyPayload.group_name = groupName;
            } else if (mode === 'relations') {
                const sender = document.getElementById('wechat-sender-input').value.trim();
                if (!sender) {
                    alert('关系网图分析模式下必须在左侧输入"发言人筛选"的姓名/昵称');
                    return;
                }
                endpoint = '/api/wechat/analyze/relations';
                bodyPayload.username = sender;
            }

            _wechatAiRunning = true;
            status.className = 'analysis-status loading';
            status.textContent = '⏳ AI 研判中...';
            resultDiv.innerHTML = '<div style="text-align: center; color: var(--text-muted, #64748b); margin-top: 60px;">大模型研判处理中,可能耗时数十秒,请稍后...</div>';

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyPayload)
                });

                const data = await res.json();
                if (!res.ok || !data.success) {
                    throw new Error(data.detail || '分析失败');
                }

                status.className = 'analysis-status done';
                status.textContent = '✅ 分析完成' + (data.from_cache ? ' (来自缓存)' : '');

                // 添加缓存状态提示
                let cacheInfo = '';
                if (data.from_cache) {
                    cacheInfo = `
                        <div style="margin-top: 10px; padding: 8px 12px; background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); border-radius: 6px; font-size: 0.85rem; color: #f59e0b;">
                            ⚠️ 此结果来自缓存(1小时内有效)
                            <button onclick="clearWechatAICache()" style="margin-left: 10px; padding: 2px 8px; background: rgba(245, 158, 11, 0.2); border: 1px solid rgba(245, 158, 11, 0.5); border-radius: 4px; color: #f59e0b; cursor: pointer; font-size: 0.8rem;">清除缓存</button>
                        </div>
                    `;
                }

                let reportContent = '无分析数据返回';
                if (data.analysis) {
                    reportContent = data.analysis;
                } else if (data.data) {
                    if (typeof data.data === 'object') {
                        reportContent = data.data.ai_analysis || '无分析数据返回';
                        if (data.data.mermaid_chart) {
                            reportContent = "### 🕸️ 关系网络图谱\n\n```mermaid\n" + data.data.mermaid_chart + "\n```\n\n" + reportContent;
                        }
                    } else {
                        reportContent = data.data;
                    }
                }
                resultDiv.innerHTML = cacheInfo + kbRenderMarkdown(reportContent);

                // 异步渲染 Mermaid 图表
                setTimeout(() => {
                    if (window.mermaid) {
                        resultDiv.querySelectorAll('.mermaid').forEach((container, i) => {
                            try {
                                const code = container.textContent.trim();
                                const id = `mermaid-wechat-${Date.now()}-${i}`;
                                container.id = id;
                                container.removeAttribute('data-processed');
                                mermaid.render('mermaid-svg-' + id, code).then(({ svg }) => {
                                    container.innerHTML = svg;
                                }).catch(err => {
                                    container.innerHTML = `<pre style="color: #f43f5e; background: rgba(244,63,94,0.05); padding: 10px; border-radius: 6px;">Mermaid 渲染失败: ${err.message}</pre>`;
                                });
                            } catch(e) {
                                console.error('Mermaid render error:', e);
                            }
                        });
                    }
                }, 50);

            } catch(err) {
                console.error('AI 研判发生错误:', err);
                status.className = 'analysis-status error';
                status.textContent = `❌ ${err.message}`;
                resultDiv.innerHTML = `<div style="color: #ef4444; padding: 10px;">研判失败: ${escapeHtml(err.message)}</div>`;
            } finally {
                _wechatAiRunning = false;
            }
        }

        function clearWechatAIResult() {
            document.getElementById('wechat-ai-result').innerHTML = '<div style="text-align: center; color: var(--text-muted, #64748b); margin-top: 60px;">等待 AI 深度研判分析输出结果...</div>';
            const status = document.getElementById('wechat-action-status');
            status.className = 'analysis-status';
            status.textContent = '';
        }

        // 清除 AI 分析缓存
        async function clearWechatAICache() {
            if (!confirm('确定要清除 AI 分析缓存吗?\n\n清除后,下次分析将重新计算(耗时更长)。')) {
                return;
            }

            try {
                const res = await fetch('/api/wechat/cache/clear', { method: 'POST' });
                const result = await res.json();
                if (result.success) {
                    alert('✅ 缓存已清除');
                    // 隐藏缓存状态
                    document.getElementById('wechat-cache-status').style.display = 'none';
                    // 重新运行分析(不使用缓存)
                    const mode = document.getElementById('wechat-ai-mode').value;
                    document.getElementById('wechat-ai-cache').checked = false;
                    await runWechatAIAnalysis();
                } else {
                    alert('❌ 清除缓存失败');
                }
            } catch(err) {
                console.error('清除缓存失败:', err);
                alert('❌ 清除缓存失败,请重试');
            }
        }

        // 查看缓存状态
        async function checkWechatAICacheStatus() {
            try {
                const res = await fetch('/api/wechat/cache/status');
                const result = await res.json();
                if (result.success) {
                    const cacheStatus = document.getElementById('wechat-cache-status');
                    const cacheCount = document.getElementById('wechat-cache-count');

                    cacheCount.textContent = result.data.count;
                    cacheStatus.style.display = 'block';

                    if (result.data.count === 0) {
                        cacheStatus.querySelector('span').textContent = '缓存状态: 无缓存';
                        cacheStatus.querySelector('button').style.display = 'none';
                    } else {
                        const ttlMinutes = Math.floor(result.data.ttl / 60);
                        cacheStatus.querySelector('span').innerHTML = `缓存状态: <span id="wechat-cache-count">${result.data.count}</span> 条 (TTL: ${ttlMinutes}分钟)`;
                        cacheStatus.querySelector('button').style.display = 'inline-block';
                    }
                }
            } catch(err) {
                console.error('获取缓存状态失败:', err);
            }
        }

        // --- 绑定事件 ---
        document.addEventListener('DOMContentLoaded', () => {
            // 加载微信会话列表
            loadWechatSessions();
            // 绑定滚动分页加载
            const feed = document.getElementById('wechat-bubble-feed');
            if (feed) {
                feed.addEventListener('scroll', async () => {
                    if (!virtualScrollState.isEnabled) {
                        await handleScrollPagination(feed);
                    }
                });
            }

            // 绑定微信会话过滤与检索事件
            const searchSessionInput = document.getElementById('wechat-session-search');
            if (searchSessionInput) {
                searchSessionInput.addEventListener('input', renderWechatSessionOptions);
            }
            const filterSessionType = document.getElementById('wechat-session-type-filter');
            if (filterSessionType) {
                filterSessionType.addEventListener('change', renderWechatSessionOptions);
            }

            // 绑定微信会话下拉框切换事件
            const selectWechatSession = document.getElementById('wechat-session-select');
            if (selectWechatSession) {
                selectWechatSession.addEventListener('change', function() {
                    loadWechatSessionMessages(this.value);
                });
            }

            // 绑定日期输入框变化事件(清除快捷按钮 active 状态)
            const wechatStartDate = document.getElementById('wechat-start-date');
            const wechatEndDate = document.getElementById('wechat-end-date');
            if (wechatStartDate) {
                wechatStartDate.addEventListener('change', function() {
                    document.querySelectorAll('.date-quick-btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    if (wechatState.sessionId) {
                        loadWechatSessionMessages(wechatState.sessionId);
                    }
                });
            }
            if (wechatEndDate) {
                wechatEndDate.addEventListener('change', function() {
                    document.querySelectorAll('.date-quick-btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    if (wechatState.sessionId) {
                        loadWechatSessionMessages(wechatState.sessionId);
                    }
                });
            }
            // 绑定关键字回车检索
            const keywordInput = document.getElementById('wechat-keyword-input');
            if (keywordInput) {
                keywordInput.addEventListener('keydown', function(event) {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        searchWechatMessages();
                    }
                });
            }

        });

        // ── 工具函数 ──
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
            return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
        }

        function formatDuration(seconds) {
            if (seconds < 60) return seconds + '"';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return mins + '\'' + secs + '"';
        }

        function formatVoiceDuration(ms) {
            const seconds = Math.round(ms / 1000);
            return formatDuration(seconds);
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'pdf': '📕',
                'doc': '📘',
                'docx': '📘',
                'xls': '📗',
                'xlsx': '📗',
                'ppt': '📙',
                'pptx': '📙',
                'txt': '📄',
                'zip': '📦',
                'rar': '📦',
                '7z': '📦',
                'jpg': '🖼️',
                'jpeg': '🖼️',
                'png': '🖼️',
                'gif': '🖼️',
                'mp3': '🎵',
                'mp4': '🎬',
                'default': '📎'
            };
            return icons[ext] || icons['default'];
        }

        // ── 链接提取与渲染 ──
        function extractLinks(text) {
            const urlRegex = /https?:\/\/[^\s<>"]+/gi;
            return text.match(urlRegex) || [];
        }

        function renderLinks(text) {
            const urlRegex = /https?:\/\/[^\s<>"]+/gi;
            return text.replace(urlRegex, function(url) {
                const displayText = url.length > 40 ? url.substring(0, 40) + '...' : url;
                return `<a href="${url}" class="wechat-link-item" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">
                    <span class="wechat-link-icon">🔗</span>
                    <span class="wechat-link-text">${displayText}</span>
                </a>`;
            });
        }
    

        // Markdown render function for AI analysis
        function kbRenderMarkdown(text) {
            if (!text) return '';
            try {
                var mermaidBlocks = [];
                text = text.replace(/```mermaid\n([\s\S]*?)```/g, function(match, code) {
                    var idx = mermaidBlocks.length;
                    mermaidBlocks.push(code.trim());
                    return '%%MERMAID_' + idx + '%%';
                });

                var mathBlocks = [];
                text = text.replace(/\$\$([\s\S]*?)\$\$/g, function(match, formula) {
                    var idx = mathBlocks.length;
                    mathBlocks.push({ formula: formula.trim(), display: true });
                    return '%%MATH_BLOCK_' + idx + '%%';
                });
                text = text.replace(/\$([^$\n]+?)\$/g, function(match, formula) {
                    var idx = mathBlocks.length;
                    mathBlocks.push({ formula: formula.trim(), display: false });
                    return '%%MATH_INLINE_' + idx + '%%';
                });

                var html = marked.parse(text);

                for (var i = 0; i < mathBlocks.length; i++) {
                    var item = mathBlocks[i];
                    var key = item.display ? '%%MATH_BLOCK_' + i + '%%' : '%%MATH_INLINE_' + i + '%%';
                    try {
                        var rendered = katex.renderToString(item.formula, {
                            displayMode: item.display, throwOnError: false, trust: true
                        });
                        html = html.replace(key, rendered);
                    } catch (e) {
                        html = html.replace(key, item.display ? '$$' + item.formula + '$$' : '$' + item.formula + '$');
                    }
                }

                for (var i = 0; i < mermaidBlocks.length; i++) {
                    var code = mermaidBlocks[i];
                    var plh = '%%MERMAID_' + i + '%%';
                    var cid = 'mermaid-' + Date.now() + '-' + i;
                    var container = '<div class="mermaid-container" id="' + cid + '" data-mermaid-code="' + encodeURIComponent(code) + '">' +
                        '<div class="mermaid-loading">🔄 图表加载中...</div></div>';
                    html = html.replace(plh, container);
                }

                return html;
            } catch (e) {
                return escapeHtml(text);
            }
        }
