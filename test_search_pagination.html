<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索结果分页功能测试</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 40px;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
        }
        h2 {
            margin-top: 0;
            color: #38bdf8;
        }
        .test-section {
            margin: 20px 0;
        }
        .search-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input, button {
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 0.9rem;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        button {
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }
        .results-container {
            max-height: 400px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }
        .result-item {
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 6px;
            border-left: 3px solid #38bdf8;
        }
        .result-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .stats {
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 6px;
            font-size: 0.85rem;
            color: #38bdf8;
        }
        .load-more-btn {
            text-align: center;
            padding: 20px;
            margin-top: 15px;
        }
        .load-more-btn button {
            min-width: 150px;
        }
        .page-info {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #64748b;
        }
        .test-result {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-family: 'Cascadia Code', monospace;
            font-size: 0.85rem;
        }
        .test-item {
            margin: 5px 0;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }
        .test-item.pass {
            border-left: 3px solid #34d399;
        }
        .test-item.fail {
            border-left: 3px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h2>🔍 搜索结果分页功能测试</h2>
        
        <div class="test-section">
            <div class="search-controls">
                <input type="text" id="search-input" placeholder="输入搜索关键词..." value="测试">
                <input type="number" id="page-size" placeholder="每页条数" value="5" style="width: 100px;">
                <button onclick="performSearch()">搜索</button>
                <button onclick="resetSearch()" style="background: rgba(239, 68, 68, 0.2);">重置</button>
            </div>
            
            <div class="stats" id="stats">等待搜索...</div>
            
            <div class="results-container" id="results">
                <div style="text-align: center; color: #64748b; padding: 40px;">
                    点击"搜索"按钮开始测试
                </div>
            </div>
        </div>
        
        <div class="test-result">
            <h4 style="margin: 0 0 10px 0; color: #34d399;">✓ 测试结果</h4>
            <div id="test-results"></div>
        </div>
    </div>

    <script>
        // 模拟搜索状态
        let searchState = {
            keyword: '',
            limit: 5,
            offset: 0,
            total: 0,
            results: [],
            isLoading: false
        };
        
        // 模拟数据生成
        function generateMockData(keyword, total) {
            const results = [];
            for (let i = 0; i < total; i++) {
                results.push({
                    id: i + 1,
                    content: `${keyword} 消息内容 #${i + 1} - 这是模拟的搜索结果`,
                    sender: `用户${(i % 10) + 1}`,
                    time: new Date(Date.now() - i * 3600000).toLocaleString('zh-CN')
                });
            }
            return results;
        }
        
        // 执行搜索
        async function performSearch(loadMore = false) {
            const keyword = document.getElementById('search-input').value.trim();
            const limit = parseInt(document.getElementById('page-size').value) || 5;
            const stats = document.getElementById('stats');
            const resultsDiv = document.getElementById('results');
            
            if (!keyword) {
                alert('请输入搜索关键词');
                return;
            }
            
            if (!loadMore) {
                // 新搜索
                searchState.keyword = keyword;
                searchState.limit = limit;
                searchState.offset = 0;
                searchState.results = [];
                searchState.total = 23; // 模拟总共23条结果
                
                stats.textContent = '🔍 正在搜索...';
                resultsDiv.innerHTML = '<div style="text-align: center; color: #64748b; padding: 40px;">搜索中...</div>';
            } else {
                // 加载更多
                if (searchState.isLoading) return;
                stats.textContent = '🔍 正在加载更多...';
            }
            
            searchState.isLoading = true;
            
            // 模拟网络延迟
            await new Promise(resolve => setTimeout(resolve, 500));
            
            // 生成模拟数据
            const allResults = generateMockData(keyword, searchState.total);
            const newResults = allResults.slice(searchState.offset, searchState.offset + searchState.limit);
            
            if (loadMore) {
                searchState.results = searchState.results.concat(newResults);
            } else {
                searchState.results = newResults;
            }
            
            searchState.offset = searchState.results.length;
            
            // 计算分页状态
            const loadedCount = searchState.results.length;
            const hasMore = loadedCount < searchState.total;
            
            stats.textContent = `共搜索到 ${searchState.total} 条匹配结果，已加载 ${loadedCount} 条`;
            
            // 渲染结果
            let html = '';
            searchState.results.forEach(item => {
                html += `
                    <div class="result-item">
                        <div style="font-weight: 500; color: #38bdf8;">${item.sender}</div>
                        <div style="margin: 5px 0;">${item.content}</div>
                        <div style="font-size: 0.8rem; color: #64748b;">${item.time}</div>
                    </div>
                `;
            });
            
            resultsDiv.innerHTML = html;
            
            // 添加"加载更多"按钮
            if (hasMore) {
                const loadMoreBtn = document.createElement('div');
                loadMoreBtn.className = 'load-more-btn';
                loadMoreBtn.innerHTML = `
                    <button onclick="performSearch(true)">
                        📥 加载更多 (${searchState.total - loadedCount} 条剩余)
                    </button>
                    <div class="page-info">
                        当前: 第 ${Math.ceil(loadedCount / searchState.limit)} 页 / 共 ${Math.ceil(searchState.total / searchState.limit)} 页
                    </div>
                `;
                resultsDiv.appendChild(loadMoreBtn);
            }
            
            searchState.isLoading = false;
            
            // 运行测试
            runTests();
        }
        
        // 重置搜索
        function resetSearch() {
            searchState = {
                keyword: '',
                limit: 5,
                offset: 0,
                total: 0,
                results: [],
                isLoading: false
            };
            
            document.getElementById('search-input').value = '测试';
            document.getElementById('stats').textContent = '等待搜索...';
            document.getElementById('results').innerHTML = '<div style="text-align: center; color: #64748b; padding: 40px;">点击"搜索"按钮开始测试</div>';
            document.getElementById('test-results').innerHTML = '';
        }
        
        // 运行测试
        function runTests() {
            const tests = [
                {
                    name: '首次搜索返回结果',
                    pass: searchState.results.length > 0,
                    detail: `返回 ${searchState.results.length} 条结果`
                },
                {
                    name: '分页参数正确',
                    pass: searchState.offset === searchState.results.length,
                    detail: `offset=${searchState.offset}, loaded=${searchState.results.length}`
                },
                {
                    name: '总数统计正确',
                    pass: searchState.total > 0,
                    detail: `total=${searchState.total}`
                },
                {
                    name: '状态管理正确',
                    pass: searchState.keyword !== '' && searchState.limit > 0,
                    detail: `keyword="${searchState.keyword}", limit=${searchState.limit}`
                }
            ];
            
            const resultDiv = document.getElementById('test-results');
            resultDiv.innerHTML = tests.map(t => `
                <div class="test-item ${t.pass ? 'pass' : 'fail'}">
                    ${t.pass ? '✓' : '✗'} ${t.name}: ${t.detail}
                </div>
            `).join('');
        }
        
        // 自动测试
        document.addEventListener('DOMContentLoaded', () => {
            console.log('自动测试开始...');
            setTimeout(() => {
                performSearch();
            }, 500);
        });
    </script>
</body>
</html>
