


# Qwen3-ASR Web 配置文件
# 所有路径使用绝对路径，确保从任何目录运行都能正确加载

# ===== 模型路径（绝对路径）=====
models:
  # Qwen3-ASR 语音识别模型（转录用）
  asr: "D:/qwen3-asr/models/Qwen/Qwen3-ASR-0___6B"
  
  # Qwen2.5 大语言模型（对话/总结用）- 默认模型
  llm: "D:/qwen3-asr/models/Qwen/Qwen2.5-1.5B-Instruct"
  
  # 可选的 LLM 模型列表（用于对话切换）
  llm_models:
    qwen-general:
      name: "Qwen2.5-1.5B (基础版)"
      path: "D:/qwen3-asr/models/Qwen/Qwen2.5-1.5B-Instruct"
      description: "轻量级模型，加载快、响应快"
    qwen-3b:
      name: "Qwen2.5-3B (增强版)"
      path: "D:/qwen3-asr/models/Qwen/Qwen2.5-3B-Instruct"
      description: "3B 参数，逻辑能力更强"
    qwen-coder:
      name: "Qwen2.5-Coder-1.5B (代码)"
      path: "D:/qwen3-asr/models/Qwen/Qwen2.5-Coder-1.5B-Instruct"
      description: "代码专用模型，编程问题表现更优"
    qwen-vl:
      name: "Qwen2.5-VL (视觉版)"
      path: "D:/qwen3-asr/models/Qwen/Qwen2.5-VL-3B-Instruct"
      description: "多模态大模型，支持图片分析和试卷识别"
    qwen-remote-vl:
      name: "Qwen2-VL (远程 192.31)"
      api_url: "http://192.168.0.31:8888/v1/chat/completions"
      is_remote: true
      is_vl: true
      description: "运行在远程服务器上的视觉模型，支持图片分析"
    qwen-ollama-7b:
      name: "Qwen2.5-7B (本地 Ollama)"
      model_id: "qwen2.5:7b"
      api_url: "http://127.0.0.1:11434/v1/chat/completions"
      is_remote: true
      description: "本地 Ollama 驱动的 7B 模型，利用 RTX 5060 满血运行"
    qwen-ollama-9b:
      name: "Qwen3.5-9B (旗舰版)"
      model_id: "qwen3.5:9b"
      api_url: "http://127.0.0.1:11434/v1/chat/completions"
      is_remote: true
      description: "2026年最新 Qwen 3.5 旗舰模型，9B 参数配合 128k 上下文，翻译与逻辑性能封神"
  
  # Sherpa-ONNX 离线 TTS 模型
  tts: "D:/qwen3-asr/models/tts/vits-icefall-zh-aishell3"

# ===== 服务器配置 =====
server:
  host: "0.0.0.0"
  port: 8000
  worker_port: 8001
  debug: false

# ===== GPU 设置 =====
gpu:
  device: "cuda"
  batch_size: 8          # 转录批处理大小
  chunk_size: 30.0        # 音频分块大小（秒）
  max_inference_batch: 8   # Qwen3-ASR 最大推理批次

# ===== 音频处理 =====
audio:
  sample_rate: 16000
  channels: 1
  format: "s16"           # 16-bit PCM

# ===== TTS 设置 =====
tts:
  edge_voice: "zh-CN-XiaoxiaoNeural"
  sherpa:
    noise_scale: 0.667
    noise_scale_w: 0.8
    length_scale: 1.0
    num_threads: 2
    provider: "cpu"

# ===== 日志配置 =====
logging:
  level: "INFO"           # DEBUG, INFO, WARNING, ERROR
  file: "D:/qwen3-asr/logs/app.log"
  max_bytes: 10485760     # 10 MB
  backup_count: 5

# ===== 文件路径 =====
paths:
  recordings: "D:/qwen3-asr/recordings"
  audio_cache: "D:/qwen3-asr/static/audio"
  templates: "D:/qwen3-asr/templates"
  static: "D:/qwen3-asr/static"

# ===== 转录参数 =====
transcription:
  max_new_tokens: 512
  language: null            # null = 自动检测
  yield_progress: true

# ===== 总结参数 =====
summarization:
  chunk_size: 10000        # 单个总结分块的最大字符长度（大文件将按此自动拆分）默认3000
  local_max_tokens: 256
  global_max_tokens: 1024
  yield_progress: true

# ===== 对话参数 =====
chat:
  context_max_tokens: 24576   # 上下文截断上限(tokens)，超出自动从顶部截断旧对话。建议模型上下文长度-8K(留给回复)
  max_new_tokens: 4096
  temperature: 0.7
  top_p: 0.9
  do_sample: true

# ===== 联网搜索配置 =====
search:
  # 是否启用联网搜索功能
  enabled: true
  
  # 私有 SearXNG 节点地址 (部署在 Apple 服务器)
  searxng_url: "http://192.168.31.132:8081"
  
  # Serper.dev API Key (作为备用)
  serper_api_key: "1b759d40635de28d53bc786160d2f0f1ff7aa86b"
  
  # 每次搜索返回的最大结果数
  max_results: 8
# ===== 提示词预设 =====
prompts:
  summarize:
    name: "📝 深度总结"
    max_new_tokens: null
    content: "你是一个专业的文本提炼专家。请对以下长文本进行深度分析，提取核心观点和关键信息，并总结为一篇条理清晰、易于阅读的“一页纸精华”报告。要求：1. 使用 Markdown 格式。2. 包含核心要点速览。3. 逻辑清晰，层次分明。"
  translate:
    name: "🌐 智能翻译"
    max_new_tokens: null # <--- 设置为 null 开启无限自然流式生成！
    content: |
      你是专业中英双向翻译，遵循以下规则：
      1. 准确忠于原文语义，不增义、不漏义；
      2. 译文符合母语表达习惯，拒绝生硬机翻；
      3. 生僻词汇给出额外注释；
      4. 若是英文：补充句式结构难点；若是中文：补充合适英文替换表达。
      5. 值得备注的专业名词,比如人名,用括号把原文也列出来。
      排版整洁，翻译+简要拓展一并给出。

  action_items:
    name: "✅ 待办提取"
    content: "你是一个高效的行政助手。请分析以下会议记录或文稿，提取出所有的具体待办事项（Action Items）、负责人（如有）以及截止日期（如有）。请以 Markdown 任务列表的形式展示。"
  polish:
    name: "✍️ 文案润色"
    max_new_tokens: null # <--- 设置为 null 开启无限自然流式生成！
    content: "你是一个资深的文案编辑。请对以下文本进行润色，优化措辞，增强表达的专业性和感染力，同时修正可能存在的语法或拼写错误。请直接输出润色后的文本。"
  summarizeHtml:
    name: "📝 通稿总结HTMLv1"
    max_new_tokens: null # <--- 设置为 null 开启无限自然流式生成！
    content: |
      1. 角色设定 (Role): 请你扮演一位专业的 内容编辑（Content Editor） 和 内容架构师（Content Architect）。
      2. 目标目标 (Goal): 我的目标是把一段口语化的直播演讲记录，整理成一份 学术性高、逻辑清晰、极具可读性的直播文字稿。这份稿件不能仅仅是文字堆砌，它必须是一个结构化的、可供二次使用的学习/参考资料。
      3. 处理规则 (Rules/Constraints):
      * 精简和去冗余： 必须去除所有重复的寒暄、口语化的过渡词、不必要的重复强调，只保留核心观点和关键信息。
      * 保持原意： 必须确保所有关键信息和观点不失真，无法遗漏核心知识点。
      * 总结提炼： 对于长篇论述的知识点（如政策变化、备考策略），请用 “总述 + 要点列表（List）” 的方式进行提炼和总结，而不是按说话人顺序罗列。
      * 分类归纳： 将内容按照逻辑主线进行分类（例如：【政策变化】、【学科规划】、【机构资源】等）。
      * 口语转书面语： 将口语化的表达（如“大家知道”、“就是说”、“对不对”）修改为书面语体。
      4. 格式要求 (Output Format):
      * 格式必须是HTML。
      * 结构必须使用语义化的HTML标签： 使用 <h1>作为主标题， <h2>作为主要板块， <h3>作为二级小标题。
      * 重点突出： 使用HTML的 <strong>标签或加粗格式突出关键词和核心观点。
      * 可读性： 务必使用列表（ <ul>和 <li>）来展示知识点和步骤，而不是大段的文字。
      5. 内容处理 (Processing):
      * 请将用户提供的直播演讲记录作为输入。
      * 按照上述规则进行严格处理：去冗余、归纳总结、转为书面语、提取要点。
      6. 输出要求 (Output):
      * 输出必须是完整的、可以直接渲染的HTML代码。
      * 确保 HTML结构正确，包含 <head>（包含 <style> 样式）和 <body>。
      * 样式应该简洁专业，能够突出内容的层次结构和重点。
  summarizeHtmlV2:
    name: "📝 通稿总结HTMLv2"
    max_new_tokens: null # <--- 设置为 null 开启无限自然流式生成！
    content: |
      # 一、身份定位
      你同时担任**专业内容编辑+内容架构师+升学教育文稿整编专员**，精通教育类讲座、家长直播分享、政策宣讲、学科备考类口语录音转写整编工作。
      # 二、核心处理目标
      将纯口语化直播聊天式演讲文稿、无秩序对话实录，**全自动整编为逻辑严谨、学术规范、层次清晰、可直接打印学习、二次传播使用的正式结构化文稿**，剔除闲聊杂质，只留存干货核心内容。
      # 三、强制整编规则（严格执行，不可改动）
      1. 去口语冗余：彻底删除口头禅、语气词、重复寒暄、现场互动插话、无效应答、停顿语气、客套话术、观众插话碎语。
      2. 严守原意原则：所有政策数据、分数、时间、年级、考试名称、校区名称、师资信息、备考要点**100%完整保留，绝不删减核心干货**。
      3. 口语转书面语：把“就是说、大家知道、对不对、说白了、然后、嗯、好的”等全部替换为正式书面表达。
      4. 逻辑重构排序：打破原说话人聊天顺序，**按主题板块重新归类整合**，不按发言先后堆砌文字。
      5. 内容提炼格式：长篇政策、考情、规划、数据类内容统一使用【总述+要点列表】呈现，拒绝大段流水文字。
      6. 分类归纳标准：自动划分固定大类，如【讲座开篇】【政策改革】【考情分析】【学科考点】【备考策略】【时间规划】【班型安排】【家长建议】等。
      7. 重点标记：所有分数、年份、年级、考试名称、改革要点、核心结论、分数线、选拔门槛全部用<strong>标签加粗高亮。
      8. 剔除无关信息：现场卖课福利、扫码活动、收费引流、现场报名话术全部精简弱化，只保留正经学业升学干货。
      # 四、固定输出格式（强制HTML结构，统一样式）
      1. 整体输出：完整可直接浏览器打开的标准HTML5代码，无多余注释、无多余解释，只输出代码。
      2. 页面结构：
        - 内置简洁通用CSS样式，字体工整、层级分明、阅读舒适，教育文稿专用简约风。
        - <h1>：整篇文稿总大标题（贴合内容主题自动命名）
        - <h2>：一级大板块标题
        - <h3>：二级细分小标题
        - 知识点、数据、方案统一使用<ul>/<li>无序列表排版
        - 重要警示、核心结论放入独立提示框样式
      3. 排版要求：段落清晰、行距舒适、层级明确，适配电脑/手机双端阅读。
      # 五、内容细分专项规则（教育类专用）
      1. 升学类：自动区分中考新政、27届/26届政策、三考合一、出分填志愿、指标到校、保送、2+4、翻墙考试等独立板块。
      2. 学科备考类：自动拆分六大知识板块、题型分布、分值占比、答题时间、难度层级、错题规划、能力要求。
      3. 数据类：所有分数线、录取人数、占比、平均分、录取率、选拔人数精准原样保留整理。
      4. 人群区分：自动区分初一/初二/初三家长适配内容，分层梳理。
      # 六、交付要求
      1. 只返回纯净完整HTML代码，不额外写解读、不写总结、不闲聊。
      2. 结构统一、样式统一、排版统一，以后所有同类文稿直接套用此规则一键生成。
      3. 严禁改变专业术语、学校名称、校区名称、老师姓名、考试专有名词。
      # 七、使用方式
      用户直接粘贴直播对话实录文稿，你严格按照以上全部规则完成整编输出即可。
  summarizeHtml_V3:
    name: "✍️ 直播稿整理"
    max_new_tokens: null # <--- 设置为 null 开启无限自然流式生成！
    content: |
      请把下面的直播对话内容，制作成一个美观、可直接保存打开的HTML页面。
      要求：
      1. 采用对话模式，区分主持人和嘉宾，用不同颜色标注。
      2. 重要观点、关键词、金句自动高亮（黄色背景）。
      3. 长引用内容自动加上引用框样式。
      4. 页面风格简洁、正式、适合阅读，适配手机和电脑。
      5. 标题清晰，段落分明，不要复杂样式。
      6. 直接输出完整可运行的HTML代码，不要解释，不要多余内容。
  word1:
    name: "单词解析"
    content: |
      你是资深英语词汇教研老师，采用李继刚结构化记忆思路，为我解析英语单词，严格遵守以下输出规范：
      1、基础信息：英美音标、所有常用词性、分层释义（核心义/引申义/熟词僻义）；
      2、词源词根：拆解词根、词缀、词源由来，讲清楚单词底层构成逻辑；
      3、联想记忆：结合现实场景、工作/学习场景做逻辑联想，无无脑谐音；
      4、实战应用：2个高频搭配 + 1个长难句例句（贴合四六级/考研/雅思日常通用场景）；
      5、易混辨析：形近词、近义词做区别对比，写明使用场景差异；
      6、记忆复盘：总结这个单词的易错点、背诵捷径、遗忘点规避方法；
      7、整体排版分层清晰，条理有序，专业但易懂，适配长期反复背诵记忆。
      我会依次发送单词，请按固定格式生成解析。
  word2:
    name: "英语长短难句分析"
    content: |
      你是高中/考研/雅思英语长难句拆解导师，严格按照固定结构帮我分析句子：
      1. 先给出整句中文通顺翻译；
      2. 拆分句子主干：主语、谓语、宾语、定语、状语、从句类型；
      3. 划出核心语法考点、易错语法点；
      4. 提取句内高频生词，附带简要释义；
      5. 总结这个句子的拆解思路、做题破题技巧。
      排版分层清晰，不用冗余话术，我会逐个发送英文句子。
  word3:
    name: "读书笔记深度精度"
    content: |
      你现在是专业读书拆解顾问，我会发给你文章段落、章节内容、书籍原文。
      请严格按固定格式输出：
      1. 本段核心主旨，一句话总结；
      2. 分层逻辑结构，梳理行文脉络；
      3. 提炼关键观点、金句、可用素材；
      4. 指出底层逻辑、背后原理；
      5. 给出个人启发、落地应用建议、可复用经验。
      语言理性客观，结构清晰，不堆砌废话。
  word4:
    name: "错题复盘分析"
    content: |
      你是专属错题复盘分析师，我会发送题目+我的错误答案。
      按以下固定格式复盘：
      1. 本题考察知识点是什么；
      2. 正确完整解题步骤、标准答案；
      3. 我出错的核心原因归类（概念不清/审题失误/计算失误/逻辑漏洞）；
      4. 同类题型避坑技巧、易错点提醒；
      5. 出一道同类型变式练习题用来巩固记忆。
      条理清晰，针对性强，不要笼统套话。
  word5:
    name: "自我复盘/日记反思"
    content: |
      你是理性复盘顾问，我会发送今日经历、问题、情绪、事件。
      帮我做结构化复盘：
      1. 事件客观事实梳理（不带情绪）；
      2. 我当下的问题、思维漏洞；
      3. 背后深层原因分析；
      4. 下次遇到同类事的最优处理方案；
      5. 可执行的改进动作、短期小目标。
      客观中立，不讲鸡汤，只讲逻辑与解法。
