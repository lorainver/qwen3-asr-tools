


# Qwen3-ASR Web 配置文件
# 所有路径使用绝对路径，确保从任何目录运行都能正确加载

# ===== 模型路径（绝对路径）=====
models:
  # Qwen3-ASR 语音识别模型（转录用）
  asr: "D:/qwen3-asr/models/Qwen/Qwen3-ASR-0___6B"
  
  # Qwen2.5 大语言模型（对话/总结用）- 默认模型
  llm: "D:/qwen3-asr/models/Qwen/Qwen2.5-1.5B-Instruct"
  
  # 可选的 LLM 模型列表（用于对话切换）
  llm_models:
    qwen-general:
      name: "Qwen2.5-1.5B (基础版)"
      path: "D:/qwen3-asr/models/Qwen/Qwen2.5-1.5B-Instruct"
      description: "轻量级模型，加载快、响应快"
    qwen-3b:
      name: "Qwen2.5-3B (增强版)"
      path: "D:/qwen3-asr/models/Qwen/Qwen2.5-3B-Instruct"
      description: "3B 参数，逻辑能力更强"
    qwen-coder:
      name: "Qwen2.5-Coder-1.5B (代码)"
      path: "D:/qwen3-asr/models/Qwen/Qwen2.5-Coder-1.5B-Instruct"
      description: "代码专用模型，编程问题表现更优"
    qwen-vl:
      name: "Qwen2.5-VL (视觉版)"
      path: "D:/qwen3-asr/models/Qwen/Qwen2.5-VL-3B-Instruct"
      description: "多模态大模型，支持图片分析和试卷识别"
    qwen-remote-vl:
      name: "Qwen2-VL (远程 192.31)"
      api_url: "http://192.168.0.31:8888/v1/chat/completions"
      is_remote: true
      is_vl: true
      description: "运行在远程服务器上的视觉模型，支持图片分析"
    qwen-ollama-7b:
      name: "Qwen2.5-7B (本地 Ollama)"
      api_url: "http://127.0.0.1:11434/v1/chat/completions"
      is_remote: true
      description: "本地 Ollama 驱动的 7B 模型，利用 RTX 5060 满血运行"
    qwen-ollama-9b:
      name: "Qwen3.5-9B (旗舰版)"
      model_id: "qwen3.5:9b"
      api_url: "http://127.0.0.1:11434/v1/chat/completions"
      is_remote: true
      description: "2026年最新 Qwen 3.5 旗舰模型，9B 参数配合 128k 上下文，翻译与逻辑性能封神"
  
  # Sherpa-ONNX 离线 TTS 模型
  tts: "D:/qwen3-asr/models/tts/vits-icefall-zh-aishell3"

# ===== 服务器配置 =====
server:
  host: "0.0.0.0"
  port: 8000
  worker_port: 8001
  debug: false

# ===== GPU 设置 =====
gpu:
  device: "cuda"
  batch_size: 8          # 转录批处理大小
  chunk_size: 30.0        # 音频分块大小（秒）
  max_inference_batch: 8   # Qwen3-ASR 最大推理批次

# ===== 音频处理 =====
audio:
  sample_rate: 16000
  channels: 1
  format: "s16"           # 16-bit PCM

# ===== TTS 设置 =====
tts:
  edge_voice: "zh-CN-XiaoxiaoNeural"
  sherpa:
    noise_scale: 0.667
    noise_scale_w: 0.8
    length_scale: 1.0
    num_threads: 2
    provider: "cpu"

# ===== 日志配置 =====
logging:
  level: "INFO"           # DEBUG, INFO, WARNING, ERROR
  file: "D:/qwen3-asr/logs/app.log"
  max_bytes: 10485760     # 10 MB
  backup_count: 5

# ===== 文件路径 =====
paths:
  recordings: "D:/qwen3-asr/recordings"
  audio_cache: "D:/qwen3-asr/static/audio"
  templates: "D:/qwen3-asr/templates"
  static: "D:/qwen3-asr/static"

# ===== 转录参数 =====
transcription:
  max_new_tokens: 512
  language: null            # null = 自动检测
  yield_progress: true

# ===== 总结参数 =====
summarization:
  chunk_size: 1500
  local_max_tokens: 256
  global_max_tokens: 1024
  yield_progress: true

# ===== 对话参数 =====
chat:
  max_new_tokens: 4096
  temperature: 0.7
  top_p: 0.9
  do_sample: true

# ===== 联网搜索配置 =====
search:
  # 是否启用联网搜索功能
  enabled: true
  
  # 私有 SearXNG 节点地址 (部署在 Apple 服务器)
  searxng_url: "http://192.168.31.132:8081"
  
  # Serper.dev API Key (作为备用)
  serper_api_key: "1b759d40635de28d53bc786160d2f0f1ff7aa86b"
  
  # 每次搜索返回的最大结果数
  max_results: 8
# ===== 提示词预设 =====
prompts:
  summarize:
    name: "📝 深度总结"
    content: "你是一个专业的文本提炼专家。请对以下长文本进行深度分析，提取核心观点和关键信息，并总结为一篇条理清晰、易于阅读的“一页纸精华”报告。要求：1. 使用 Markdown 格式。2. 包含核心要点速览。3. 逻辑清晰，层次分明。"
  translate:
    name: "🌐 智能翻译"
    content: |
      你是专业中英双向翻译，遵循以下规则：
      1. 准确忠于原文语义，不增义、不漏义；
      2. 译文符合母语表达习惯，拒绝生硬机翻；
      3. 生僻词汇给出额外注释；
      4. 若是英文：补充句式结构难点；若是中文：补充合适英文替换表达。
      排版整洁，翻译+简要拓展一并给出。

  action_items:
    name: "✅ 待办提取"
    content: "你是一个高效的行政助手。请分析以下会议记录或文稿，提取出所有的具体待办事项（Action Items）、负责人（如有）以及截止日期（如有）。请以 Markdown 任务列表的形式展示。"
  polish:
    name: "✍️ 文案润色"
    content: "你是一个资深的文案编辑。请对以下文本进行润色，优化措辞，增强表达的专业性和感染力，同时修正可能存在的语法或拼写错误。请直接输出润色后的文本。"
